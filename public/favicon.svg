<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="reactGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#61dafb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a9eff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle for better visibility on various browser themes -->
  <circle cx="50" cy="50" r="48" fill="#0b1326" stroke="#61dafb" stroke-width="2"/>
  
  <!-- React Atom Symbol simplified for favicon scale -->
  <g transform="translate(50, 50) scale(0.7)">
    <circle cx="0" cy="0" r="8" fill="url(#reactGradient)"/>
    <g fill="none" stroke="url(#reactGradient)" stroke-width="4">
      <ellipse rx="44" ry="16" />
      <ellipse rx="44" ry="16" transform="rotate(60)" />
      <ellipse rx="44" ry="16" transform="rotate(120)" />
    </g>
  </g>
  
  <!-- "!" for the "YOU SHOULD KNOW REACT!" punch -->
  <rect x="72" y="15" width="12" height="12" rx="2" fill="#F7DF1E" transform="rotate(15, 78, 21)"/>
  <text x="74" y="25" font-family="Plus Jakarta Sans, sans-serif" font-weight="bold" font-size="10" fill="#0b1326">!</text>
</svg>